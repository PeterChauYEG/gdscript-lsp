name: Develop CI

run-name: PR CI

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches-ignore:
      - main

permissions:
  contents: read

env:
  CARGO_HOME: /home/github-runner/cargo-cache

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: fmt
    runs-on: [self-hosted, catfood]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: cargo fmt
        run: cargo fmt --check

  clippy:
    name: clippy
    runs-on: [self-hosted, catfood]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: cargo clippy
        run: cargo clippy -- -D warnings

  test:
    name: test
    runs-on: [self-hosted, catfood]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: cargo test
        run: cargo test

  slack-notification:
    runs-on: [self-hosted, catfood]
    if: always()
    needs:
      - fmt
      - clippy
      - test
    steps:
      - name: Post a message in a channel
        if: ${{ env.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v2.1.1
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "*GitHub Action build result*: ${{ job.status }}\n${{ github.event.pull_request.html_url || github.event.head_commit.url }}"
            blocks:
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "GitHub Action build result: ${{ job.status }}\n${{ github.event.pull_request.html_url || github.event.head_commit.url }}"
